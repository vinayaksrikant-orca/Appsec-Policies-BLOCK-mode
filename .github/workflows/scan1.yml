name: Sample Orca Container Build & Scan (Annotations Only)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  orca-container_scan:
    name: Orca Container Image Scan
    runs-on: ubuntu-latest
    
    # We only need read permissions since we are printing to the terminal, 
    # not uploading to the GitHub Security API.
    permissions:
      contents: read
      actions: read

    env:
      PROJECT_KEY: testing-project-vinayak # <--- REPLACE WITH YOUR ACTUAL PROJECT KEY
      IMAGE_NAME: my-alpine-test:latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 1. Build a small, fast image to test the scanner
      - name: Create Sample Dockerfile & Build Image
        run: |
          echo "FROM alpine:3.14" > Dockerfile
          echo "RUN apk add --no-cache curl" >> Dockerfile
          docker build -t ${{ env.IMAGE_NAME }} .

      # 2. Run the Orca Scanner and ONLY output SARIF
      - name: Run Orca Container Image Scan
        uses: orcasecurity/shiftleft-container-image-action@v1
        with:
          api_token: ${{ secrets.ORCA_SECURITY_API_TOKEN }}
          project_key: ${{ env.PROJECT_KEY }}
          image: ${{ env.IMAGE_NAME }}
          format: "sarif"
          output: "results/"
          display_name: "Orca Container Scan"

      # 3. Parse the SARIF file and force GitHub Annotations
      - name: Generate GitHub Annotations
        if: always()
        run: |
          # Find the SARIF file generated by Orca
          SARIF_FILE=$(find results/ -name "*.sarif" | head -n 1)
          
          if [ -f "$SARIF_FILE" ]; then
            echo "Generating annotations from $SARIF_FILE..."
            
            # Use 'jq' to read the SARIF file and convert each vulnerability 
            # into a GitHub Action Annotation command
            jq -r '.runs[].results[]? | select(.ruleId != null) | "::warning title=\(.ruleId)::\((.message.text // "No description provided") | gsub("\n"; " ") | gsub("\r"; ""))"' "$SARIF_FILE"
            
          else
            echo "No SARIF file found. No vulnerabilities to annotate!"
          fi
